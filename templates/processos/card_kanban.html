<div class="bg-white dark:bg-darkCard p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow group relative">
    <div class="flex justify-between items-start mb-2">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{{ processo.numero }}</span>
        <a href="{% url 'processos:detalhes' processo.pk %}" class="opacity-0 group-hover:opacity-100 transition-opacity text-brand-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
        </a>
    </div>
    <h3 class="font-semibold text-sm mb-3 line-clamp-2 leading-tight">{{ processo.titulo }}</h3>
    
    <div class="flex items-center justify-between pt-3 border-t border-slate-100 dark:border-slate-800">
        <div class="flex items-center space-x-2">
            <div class="w-6 h-6 rounded-full bg-brand-100 dark:bg-brand-900/30 flex items-center justify-center text-[10px] font-bold text-brand-700 dark:text-brand-400">
                {{ processo.advogado.username|slice:":1"|upper }}
            </div>
            <span class="text-[10px] text-slate-500 font-medium">{{ processo.advogado.username }}</span>
        </div>
        <div class="text-[10px] text-slate-400">
            {{ processo.updated_at|date:"d/m" }}
        </div>
    </div>
</div>
