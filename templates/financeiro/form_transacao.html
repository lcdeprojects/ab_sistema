{% extends 'base.html' %}

{% block title %}Nova Transação - AB Advocacia{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold">Nova Transação</h1>
        <p class="text-slate-600 dark:text-slate-400">Lance um novo pagamento ou recebimento.</p>
    </div>

    <form method="POST" class="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 space-y-4">
        {% csrf_token %}
        
        <div class="space-y-1">
            <label for="id_cliente" class="text-sm font-medium">Cliente</label>
            <select name="cliente" id="id_cliente" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
                {% for cliente in form.fields.cliente.queryset %}
                    <option value="{{ cliente.pk }}">{{ cliente.nome }} {{ cliente.sobrenome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1">
                <label for="id_tipo" class="text-sm font-medium">Tipo</label>
                <select name="tipo" id="id_tipo" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="space-y-1">
                <label for="id_status" class="text-sm font-medium">Status</label>
                <select name="status" id="id_status" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
                    <option value="pendente">Pendente</option>
                    <option value="pago">Pago</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1">
                <label for="id_valor" class="text-sm font-medium">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" id="id_valor" required 
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div class="space-y-1">
                <label for="id_data" class="text-sm font-medium">Data</label>
                <input type="date" name="data" id="id_data" required 
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
        </div>

        <div class="space-y-1">
            <label for="id_descricao" class="text-sm font-medium">Descrição / Observação</label>
            <input type="text" name="descricao" id="id_descricao" required 
                   class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
        </div>

        <div class="pt-4 flex justify-end space-x-3">
            <a href="{% url 'financeiro:dashboard' %}" class="px-4 py-2 text-slate-600 dark:text-slate-400 hover:text-slate-900 transition-colors">Cancelar</a>
            <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                Lançar Transação
            </button>
        </div>
    </form>
</div>
{% endblock %}
