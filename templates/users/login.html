{% extends 'base.html' %}

{% block title %}Entrar - AB Advocacia{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-brand-600 to-brand-400 bg-clip-text text-transparent mb-2">AB Advocacia</h1>
        <p class="text-slate-500">Gestão Jurídica e Financeira</p>
    </div>

    <form method="POST" class="bg-white dark:bg-darkCard rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-8 space-y-6">
        {% csrf_token %}
        
        <div class="space-y-1">
            <label for="id_username" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Usuário</label>
            <input type="text" name="username" id="id_username" required autofocus
                   class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none transition-all">
        </div>

        <div class="space-y-1">
            <label for="id_password" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Senha</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none transition-all">
        </div>

        {% if form.errors %}
            <p class="text-sm text-red-600 bg-red-50 dark:bg-red-900/20 p-3 rounded-lg">Usuário ou senha incorretos.</p>
        {% endif %}

        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-500/20 transform hover:scale-[1.02] transition-all">
            Acessar Sistema
        </button>
    </form>
</div>
{% endblock %}
