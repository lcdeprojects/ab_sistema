{% extends 'base.html' %}

{% block title %}Confirmar Exclusão - AB Advocacia{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-darkCard rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-8 text-center">
        <div class="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center text-red-600 dark:text-red-400 mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        
        <h1 class="text-2xl font-bold mb-4">Confirmar Exclusão</h1>
        <p class="text-slate-600 dark:text-slate-400 mb-8">
            Você tem certeza que deseja excluir <strong>{{ object }}</strong>? Esta ação não pode ser desfeita.
        </p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all">
                Sim, Excluir Definitivamente
            </button>
            <a href="javascript:history.back()" class="block w-full text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 py-2">
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
